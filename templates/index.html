{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CollabFlow — Real-Time Dependency Graph</title>
    <meta name="description" content="Real-time multiplayer dependency graph and WBS engine with critical path analysis">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #06080d;
            --bg-secondary: #0c111b;
            --bg-tertiary: #151c2c;
            --bg-elevated: #1a2236;
            --bg-glass: rgba(12, 17, 27, 0.88);
            --text-primary: #edf2f7;
            --text-secondary: #94a3b8;
            --text-muted: #5a6a80;
            --accent-blue: #3b82f6;
            --accent-indigo: #6366f1;
            --accent-amber: #f59e0b;
            --accent-amber-dim: rgba(245, 158, 11, 0.15);
            --accent-emerald: #10b981;
            --accent-red: #ef4444;
            --accent-cyan: #06b6d4;
            --border-subtle: rgba(148, 163, 184, 0.06);
            --border-default: rgba(148, 163, 184, 0.12);
            --border-strong: rgba(148, 163, 184, 0.2);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.4);
            --shadow-lg: 0 20px 48px rgba(0,0,0,0.5);
            --shadow-glow-amber: 0 0 20px rgba(245, 158, 11, 0.25);
            --shadow-glow-blue: 0 0 20px rgba(59, 130, 246, 0.2);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 20px;
            --font-sans: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .app-layout {
            display: grid;
            grid-template-columns: 360px 1fr;
            grid-template-rows: 1fr;
            height: 100vh;
            width: 100vw;
        }

        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-default);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border-subtle);
            flex-shrink: 0;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .sidebar-brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-indigo));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            color: white;
            box-shadow: var(--shadow-glow-blue);
        }

        .sidebar-brand-text {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .connection-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .connection-badge.connected {
            background: rgba(16, 185, 129, 0.12);
            color: var(--accent-emerald);
        }

        .connection-badge.disconnected {
            background: rgba(239, 68, 68, 0.12);
            color: var(--accent-red);
        }

        .connection-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        .connected .connection-dot { background: var(--accent-emerald); }
        .disconnected .connection-dot { background: var(--accent-red); animation: none; }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-subtle);
            flex-shrink: 0;
        }

        .stat-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 12px 14px;
        }

        .stat-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            font-family: var(--font-mono);
            letter-spacing: -0.5px;
        }

        .stat-value.amber { color: var(--accent-amber); }
        .stat-value.blue { color: var(--accent-blue); }

        .sidebar-section-title {
            padding: 16px 24px 8px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .wbs-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px;
            scrollbar-width: thin;
            scrollbar-color: var(--bg-elevated) transparent;
        }

        .wbs-list::-webkit-scrollbar { width: 5px; }
        .wbs-list::-webkit-scrollbar-track { background: transparent; }
        .wbs-list::-webkit-scrollbar-thumb {
            background: var(--bg-elevated);
            border-radius: 10px;
        }

        .wbs-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            border-left: 3px solid var(--accent-blue);
            border-radius: var(--radius-md);
            padding: 12px 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 180ms ease;
        }

        .wbs-card:hover {
            background: var(--bg-elevated);
            border-color: var(--border-default);
            transform: translateX(2px);
        }

        .wbs-card.critical {
            border-left-color: var(--accent-amber);
            background: linear-gradient(135deg, var(--bg-tertiary), var(--accent-amber-dim));
        }

        .wbs-card.selected {
            border-color: var(--accent-blue);
            box-shadow: var(--shadow-glow-blue);
        }

        .wbs-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .wbs-card-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .wbs-card-effort {
            font-size: 11px;
            font-weight: 600;
            font-family: var(--font-mono);
            color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.1);
            padding: 2px 8px;
            border-radius: 100px;
        }

        .wbs-bar-container {
            height: 6px;
            background: var(--bg-primary);
            border-radius: 100px;
            margin-bottom: 8px;
            overflow: hidden;
            position: relative;
        }

        .wbs-bar-fill {
            position: absolute;
            top: 0;
            height: 100%;
            border-radius: 100px;
            transition: all 300ms ease;
        }

        .wbs-bar-es { background: var(--accent-blue); opacity: 0.8; }
        .wbs-bar-ls { background: var(--accent-indigo); opacity: 0.3; }
        .wbs-card.critical .wbs-bar-es { background: var(--accent-amber); }

        .wbs-metrics {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .wbs-metric {
            font-size: 10px;
            font-family: var(--font-mono);
            color: var(--text-muted);
        }

        .wbs-metric-value {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .canvas-area {
            position: relative;
            overflow: hidden;
            background: var(--bg-primary);
        }

        .toolbar {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-xl);
            z-index: 20;
            box-shadow: var(--shadow-lg);
        }

        .toolbar-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: var(--radius-lg);
            color: var(--text-secondary);
            font-family: var(--font-sans);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 150ms ease;
            white-space: nowrap;
        }

        .toolbar-btn:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border-color: var(--border-subtle);
        }

        .toolbar-btn.active {
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent-indigo);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .toolbar-btn.danger:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
        }

        .toolbar-divider {
            width: 1px;
            height: 24px;
            background: var(--border-default);
            margin: 0 4px;
        }

        .toolbar-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        #graphCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #graphCanvas.dragging-node { cursor: grabbing; }
        #graphCanvas.edge-mode { cursor: crosshair; }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-overlay.visible { display: flex; }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-xl);
            padding: 32px;
            width: 400px;
            box-shadow: var(--shadow-lg);
            animation: modal-in 200ms ease;
        }

        @keyframes modal-in {
            from { opacity: 0; transform: scale(0.95) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -0.3px;
        }

        .modal-field {
            margin-bottom: 16px;
        }

        .modal-field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-field input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 14px;
            outline: none;
            transition: border-color 150ms ease;
        }

        .modal-field input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 24px;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 150ms ease;
        }

        .modal-btn.secondary {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border-color: var(--border-default);
        }

        .modal-btn.secondary:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .modal-btn.primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-indigo));
            color: white;
        }

        .modal-btn.primary:hover {
            opacity: 0.9;
            box-shadow: var(--shadow-glow-blue);
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            animation: toast-in 300ms ease, toast-out 300ms ease 2.7s forwards;
            box-shadow: var(--shadow-md);
            max-width: 360px;
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .toast.success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }

        .toast.info {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #93c5fd;
        }

        @keyframes toast-in {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes toast-out {
            from { opacity: 1; }
            to { opacity: 0; transform: translateY(-10px); }
        }

        .edge-mode-banner {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: var(--radius-xl);
            color: var(--accent-indigo);
            font-size: 13px;
            font-weight: 500;
            z-index: 20;
            display: none;
            backdrop-filter: blur(12px);
        }

        .edge-mode-banner.visible { display: block; }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .empty-state-text {
            font-size: 13px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="sidebar-brand-icon">CF</div>
                    <span class="sidebar-brand-text">CollabFlow</span>
                </div>
                <div class="connection-badge disconnected" id="connectionBadge">
                    <span class="connection-dot"></span>
                    <span id="connectionText">Connecting</span>
                </div>
            </div>

            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-label">Duration</div>
                    <div class="stat-value amber" id="statDuration">0h</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Tasks</div>
                    <div class="stat-value blue" id="statTasks">0</div>
                </div>
            </div>

            <div class="sidebar-section-title">Work Breakdown Structure</div>

            <div class="wbs-list" id="wbsList">
                <div class="empty-state" id="emptyState">
                    <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="3"/>
                        <path d="M12 8v8M8 12h8"/>
                    </svg>
                    <div class="empty-state-text">No tasks yet.<br>Click "Add Node" to begin.</div>
                </div>
            </div>
        </aside>

        <div class="canvas-area">
            <div class="toolbar">
                <button class="toolbar-btn" id="btnAddNode" onclick="openNodeModal()">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M12 8v8M8 12h8"/></svg>
                    Add Node
                </button>
                <button class="toolbar-btn" id="btnEdgeMode" onclick="toggleEdgeMode()">
                    <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    Add Edge
                </button>
                <div class="toolbar-divider"></div>
                <button class="toolbar-btn danger" id="btnDelete" onclick="deleteSelected()">
                    <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    Delete
                </button>
            </div>

            <canvas id="graphCanvas"></canvas>

            <div class="edge-mode-banner" id="edgeModeBanner">
                Click a source node, then a target node to create a dependency. Press Esc to cancel.
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="nodeModal">
        <div class="modal">
            <h3>Create New Task</h3>
            <div class="modal-field">
                <label for="inputNodeLabel">Task Label</label>
                <input type="text" id="inputNodeLabel" placeholder="e.g. Design Review" autofocus>
            </div>
            <div class="modal-field">
                <label for="inputNodeEffort">Effort (hours)</label>
                <input type="number" id="inputNodeEffort" placeholder="0" min="0" step="0.5" value="1">
            </div>
            <div class="modal-actions">
                <button class="modal-btn secondary" onclick="closeNodeModal()">Cancel</button>
                <button class="modal-btn primary" onclick="submitCreateNode()">Create Task</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const PROJECT_ID = "{{ project_id }}";
    </script>
    <script type="module" src="{% static 'js/app.js' %}"></script>
</body>
</html>
